<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PGx Panel Decision Tree Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--f:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;--bg:#f5f4f0;--card:#fff;--t1:#1a1a18;--t2:#5f5e5a;--t3:#888780;--bd:#dddbd4;--ok:#2e7d32;--okbg:#eaf5eb;--okbd:#a5d6a7;--bad:#c62828;--badbg:#fce8e8;--badbd:#ef9a9a}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--f);color:var(--t1)}
.dash{display:grid;grid-template-rows:auto 1fr;height:100vh;padding:8px;gap:6px}
.top{display:grid;grid-template-columns:1.15fr 1fr 1fr;gap:6px}
.ig{background:var(--card);border:0.5px solid var(--bd);border-radius:7px;padding:5px 10px 6px}
.ig-t{font:600 10px var(--f);color:var(--t3);margin:0 0 2px;text-transform:uppercase;letter-spacing:0.4px}
.sr{display:flex;align-items:center;gap:5px;height:19px}
.sr label{font:400 12px var(--f);color:var(--t2);width:140px;flex-shrink:0}
.sr input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--bd);border-radius:2px;outline:none}
.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--t1);cursor:pointer;border:2px solid var(--card)}
.sr .v{font:500 12px var(--fm);color:var(--t1);min-width:48px;text-align:right}
.bot{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:6px;min-height:0}
.pan{background:var(--card);border:0.5px solid var(--bd);border-radius:7px;padding:8px 10px;display:flex;flex-direction:column;min-height:0}
.pan h3{font:600 13px var(--f);color:var(--t1);margin:0 0 4px;display:flex;align-items:center;gap:5px;flex-shrink:0}
.sn{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;font:600 10px var(--f);flex-shrink:0}
.s1{background:#E1F5EE;color:#085041}.s2{background:#F1EFE8;color:#444441}.s3{background:#E6F1FB;color:#0C447C}
.sub{font:400 11px var(--f);color:var(--t3);margin:0 0 4px;flex-shrink:0}
.scroll{flex:1;overflow-y:auto;min-height:0}
.cd{border:0.5px solid var(--bd);border-radius:5px;padding:5px 7px;margin-bottom:3px}
.cd-h{display:flex;justify-content:space-between;align-items:center}
.cd-n{font:500 12px var(--f);color:var(--t1)}
.cd-v{font:500 12px var(--fm);color:var(--t1)}
.rw{display:flex;justify-content:space-between;padding:1px 0;font:400 12px var(--f);color:var(--t2);line-height:18px}
.rw .m{font:400 12px var(--fm);color:var(--t1)}
.pct{font:400 11px var(--fm);color:var(--t3)}
.tg{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-right:3px;line-height:16px}
.tg1{background:#d4f5e5;color:#0a5c3a}.tg2{background:#fcd5d5;color:#8b1a1a}.tg3{background:#d0e7fa;color:#0c447c}.tg4{background:#fae6c5;color:#6b3d08}.tg5{background:#F1EFE8;color:#444441}
.tot{border-radius:5px;padding:5px 8px;margin-top:5px;display:flex;justify-content:space-between;align-items:center;font:400 12px var(--f);color:var(--t2);flex-shrink:0}
.tot .m{font:600 14px var(--fm);color:var(--t1)}
.tot-a{background:#e3f2fd;border:0.5px solid #90caf9}
.tot-b{background:var(--bg);border:0.5px solid var(--bd)}
.bar{height:14px;background:var(--bg);border-radius:7px;margin:3px 0;overflow:hidden;display:flex}
.bar div{height:100%}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.sep{border-top:0.5px solid var(--bd);margin:3px 0;padding-top:3px}
.hl{font:400 11px var(--f);color:var(--t3);line-height:1.5;margin-top:4px}
.sort-row{display:flex;align-items:center;gap:4px;padding:3px 6px;border:0.5px solid var(--bd);border-radius:4px;font:500 11px var(--f);color:var(--t1)}
.sort-row .num{font:500 12px var(--fm);margin-left:auto}
.sort-row .pct{margin-left:4px}
</style>
</head>
<body>
<div class="dash">
<div class="top">
<div class="ig">
<p class="ig-t">Test, population and costs</p>
<div class="sr"><label>Variant prevalence</label><input type="range" min="0" max="100" value="7" step="1" id="prev" oninput="u()"><span class="v" id="o-prev"></span></div>
<div class="sr"><label>Sensitivity</label><input type="range" min="0" max="100" value="99" step="1" id="sens" oninput="u()"><span class="v" id="o-sens"></span></div>
<div class="sr"><label>Specificity</label><input type="range" min="0" max="100" value="99" step="1" id="spec" oninput="u()"><span class="v" id="o-spec"></span></div>
<div class="sr"><label>Panel cost</label><input type="range" min="50" max="500" value="200" step="10" id="tc" oninput="u()"><span class="v" id="o-tc"></span></div>
<div class="sr"><label>Chemo cost per patient</label><input type="range" min="200" max="8000" value="3500" step="100" id="ch" oninput="u()"><span class="v" id="o-ch"></span></div>
<div class="sr"><label>Adjusted dose cost (%)</label><input type="range" min="0" max="100" value="55" step="1" id="adjpct" oninput="u()"><span class="v" id="o-adjpct"></span></div>
</div>
<div class="ig">
<p class="ig-t">Severe reactions</p>
<div class="sr"><label>Variant, standard dose</label><input type="range" min="0" max="100" value="60" step="1" id="rv" oninput="u()"><span class="v" id="o-rv"></span></div>
<div class="sr"><label>Variant, adjusted dose</label><input type="range" min="0" max="100" value="39" step="1" id="ra" oninput="u()"><span class="v" id="o-ra"></span></div>
<div class="sr"><label>Wild-type</label><input type="range" min="0" max="100" value="23" step="1" id="rw" oninput="u()"><span class="v" id="o-rw"></span></div>
<div class="sr"><label>Cost to treat</label><input type="range" min="2000" max="50000" value="10000" step="500" id="ac" oninput="u()"><span class="v" id="o-ac"></span></div>
</div>
<div class="ig">
<p class="ig-t">Mild reactions</p>
<div class="sr"><label>Variant, standard dose</label><input type="range" min="0" max="100" value="35" step="1" id="mv" oninput="u()"><span class="v" id="o-mv"></span></div>
<div class="sr"><label>Variant, adjusted dose</label><input type="range" min="0" max="100" value="45" step="1" id="mva" oninput="u()"><span class="v" id="o-mva"></span></div>
<div class="sr"><label>Wild-type</label><input type="range" min="0" max="100" value="55" step="1" id="mw" oninput="u()"><span class="v" id="o-mw"></span></div>
<div class="sr"><label>Cost to treat</label><input type="range" min="50" max="2000" value="250" step="25" id="mc" oninput="u()"><span class="v" id="o-mc"></span></div>
</div>
</div>

<div class="bot">
<div class="pan">
<h3><span class="sn s2">1</span> No testing (1,000 patients)</h3>
<p class="sub">All standard dose. No panel cost.</p>
<div class="scroll" id="s1"></div>
<div class="tot tot-b"><span>Total cost</span><span class="m" id="tot-n"></span></div>
</div>

<div class="pan">
<h3><span class="sn s1">2</span> With testing (1,000 patients)</h3>
<p class="sub">Panel sorts patients → detected carriers get adjusted dose.</p>
<div class="scroll"><div id="s2"></div><div class="sep"></div><div id="s3"></div></div>
<div class="tot tot-a"><span>Total cost</span><span class="m" id="tot-t"></span></div>
</div>

<div class="pan">
<h3><span class="sn s3">3</span> Compare</h3>
<div class="scroll" id="s4"></div>
</div>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
const fm=n=>(n<0?'-':'')+'$'+Math.abs(Math.round(n)).toLocaleString();
const ppct=(n,tot)=>tot>0?Math.round(n/tot*100)+'%':'0%';

function u(){
  const N=1000;
  const prev=+$('prev').value/100,sens=+$('sens').value/100,spec=+$('spec').value/100;
  const tc=+$('tc').value,ac=+$('ac').value,mcC=+$('mc').value;
  const ch=+$('ch').value,adjpct=+$('adjpct').value/100;
  const rvs=+$('rv').value/100,ra=+$('ra').value/100,rw=+$('rw').value/100;
  const mvR=+$('mv').value/100,mvaR=+$('mva').value/100,mwR=+$('mw').value/100;
  const chAdj=ch*adjpct;
  const chSav=ch-chAdj;

  $('o-prev').textContent=Math.round(prev*100)+'%';
  $('o-sens').textContent=Math.round(sens*100)+'%';
  $('o-spec').textContent=Math.round(spec*100)+'%';
  $('o-tc').textContent='$'+tc;
  $('o-ch').textContent='$'+ch.toLocaleString();
  $('o-adjpct').textContent=Math.round(adjpct*100)+'%';
  $('o-rv').textContent=Math.round(rvs*100)+'%';
  $('o-ra').textContent=Math.round(ra*100)+'%';
  $('o-rw').textContent=Math.round(rw*100)+'%';
  $('o-ac').textContent='$'+ac.toLocaleString();
  $('o-mc').textContent='$'+mcC;
  $('o-mv').textContent=Math.round(mvR*100)+'%';
  $('o-mva').textContent=Math.round(mvaR*100)+'%';
  $('o-mw').textContent=Math.round(mwR*100)+'%';

  const nVar=Math.round(N*prev),nWT=N-nVar;
  const nTP=Math.round(N*prev*sens),nFN=Math.round(N*prev*(1-sens));
  const nTN=Math.round(N*(1-prev)*spec),nFP=N-nTP-nFN-nTN;

  const sevNV=Math.round(nVar*rvs),mildNV=Math.round(nVar*mvR);
  const sevNW=Math.round(nWT*rw),mildNW=Math.round(nWT*mwR);
  const cNV=nVar*ch+sevNV*ac+mildNV*mcC;
  const cNW=nWT*ch+sevNW*ac+mildNW*mcC;
  const totN=cNV+cNW,sevN=sevNV+sevNW;

  $('s1').innerHTML=`
<div class="cd"><div class="cd-h"><span class="cd-n"><span class="tg tg5">VAR</span> ${nVar} carriers <span class="pct">(${ppct(nVar,N)} of 1,000)</span></span><span class="cd-v">${fm(cNV)}</span></div>
<div class="rw"><span>Chemo: ${nVar} × ${fm(ch)}</span><span class="m">${fm(nVar*ch)}</span></div>
<div class="rw"><span>Severe: ${sevNV} of ${nVar} <span class="pct">(${ppct(sevNV,nVar)})</span> × ${fm(ac)}</span><span class="m" style="color:var(--bad)">${fm(sevNV*ac)}</span></div>
<div class="rw"><span>Mild: ${mildNV} of ${nVar} <span class="pct">(${ppct(mildNV,nVar)})</span> × ${fm(mcC)}</span><span class="m">${fm(mildNV*mcC)}</span></div></div>
<div class="cd"><div class="cd-h"><span class="cd-n"><span class="tg tg5">WT</span> ${nWT} wild-type <span class="pct">(${ppct(nWT,N)} of 1,000)</span></span><span class="cd-v">${fm(cNW)}</span></div>
<div class="rw"><span>Chemo: ${nWT} × ${fm(ch)}</span><span class="m">${fm(nWT*ch)}</span></div>
<div class="rw"><span>Severe: ${sevNW} of ${nWT} <span class="pct">(${ppct(sevNW,nWT)})</span> × ${fm(ac)}</span><span class="m" style="color:var(--bad)">${fm(sevNW*ac)}</span></div>
<div class="rw"><span>Mild: ${mildNW} of ${nWT} <span class="pct">(${ppct(mildNW,nWT)})</span> × ${fm(mcC)}</span><span class="m">${fm(mildNW*mcC)}</span></div></div>
<div class="rw" style="margin-top:2px"><span>Severe reactions</span><span class="m" style="color:var(--bad)">${sevN} of 1,000 <span class="pct">(${ppct(sevN,N)})</span></span></div>`;
  $('tot-n').textContent=fm(totN);

  $('s2').innerHTML=`
<div class="bar"><div style="width:${nTP/10}%;background:#1aab5c"></div><div style="width:${nFN/10}%;background:#e03e3e"></div><div style="width:${nTN/10}%;background:#3088dd"></div><div style="width:${nFP/10}%;background:#e89820"></div></div>
<div class="g2" style="margin-top:2px">
<div class="sort-row"><span class="tg tg1">TP</span> Detected → adj<span class="num">${nTP}</span><span class="pct">${ppct(nTP,nVar)} of ${nVar} var</span></div>
<div class="sort-row"><span class="tg tg2">FN</span> Missed → std<span class="num">${nFN}</span><span class="pct">${ppct(nFN,nVar)} of ${nVar} var</span></div>
<div class="sort-row"><span class="tg tg3">TN</span> Cleared → std<span class="num">${nTN}</span><span class="pct">${ppct(nTN,nWT)} of ${nWT} wt</span></div>
<div class="sort-row"><span class="tg tg4">FP</span> Flagged → adj<span class="num">${nFP}</span><span class="pct">${ppct(nFP,nWT)} of ${nWT} wt</span></div>
</div>`;

  function gc(tg,cls,n,parentN,parentLabel,isAdj,sevR,mildR){
    const sev=Math.round(n*sevR),mild=Math.round(n*mildR);
    const pan=n*tc;
    const chCost=isAdj?n*chAdj:n*ch;
    const chLabel=isAdj?`${n} × ${fm(ch)} × ${Math.round(adjpct*100)}%`:`${n} × ${fm(ch)}`;
    const sC=sev*ac,mC=mild*mcC;
    const tot=pan+chCost+sC+mC;
    return{sev,tot,html:`<div class="cd"><div class="cd-h"><span class="cd-n"><span class="tg ${cls}">${tg}</span> ${n} patients <span class="pct">(${ppct(n,parentN)} of ${parentN} ${parentLabel})</span></span><span class="cd-v">${fm(tot)}</span></div>
<div class="rw"><span>Panel: ${n} × ${fm(tc)}</span><span class="m">${fm(pan)}</span></div>
<div class="rw"><span>Chemo: ${chLabel}</span><span class="m">${fm(chCost)}</span></div>
<div class="rw"><span>Severe: ${sev} of ${n} <span class="pct">(${ppct(sev,n)})</span> × ${fm(ac)}</span><span class="m" style="color:var(--bad)">${fm(sC)}</span></div>
<div class="rw"><span>Mild: ${mild} of ${n} <span class="pct">(${ppct(mild,n)})</span> × ${fm(mcC)}</span><span class="m">${fm(mC)}</span></div></div>`};}

  const gTP=gc('TP','tg1',nTP,nVar,'var',true,ra,mvaR);
  const gFN=gc('FN','tg2',nFN,nVar,'var',false,rvs,mvR);
  const gTN=gc('TN','tg3',nTN,nWT,'wt',false,rw,mwR);
  const gFP=gc('FP','tg4',nFP,nWT,'wt',true,rw,mwR);
  const sevT=gTP.sev+gFN.sev+gTN.sev+gFP.sev;
  const totT=gTP.tot+gFN.tot+gTN.tot+gFP.tot;

  $('s3').innerHTML=gTP.html+gFN.html+gTN.html+gFP.html+
    `<div class="rw" style="margin-top:2px"><span>Severe reactions</span><span class="m" style="color:var(--bad)">${sevT} of 1,000 <span class="pct">(${ppct(sevT,N)})</span></span></div>`;
  $('tot-t').textContent=fm(totT);

  const diff=totT-totN,saving=diff<0,sevDiff=sevN-sevT;
  const ppD=Math.round(diff/N),nAdj=nTP+nFP;

  let ratio='';
  if(sevDiff>0&&!saving) ratio=`<div class="rw"><span>Cost per reaction prevented</span><span class="m">${fm(Math.round(diff/sevDiff))}</span></div>`;
  else if(sevDiff>0&&saving) ratio=`<div style="font:500 11px var(--f);color:var(--ok);margin:3px 0">Dominant: cheaper and prevents reactions</div>`;

  $('s4').innerHTML=`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px">
<div style="background:var(--bg);border-radius:5px;padding:7px;text-align:center">
<div style="font:400 11px var(--f);color:var(--t3)">With testing</div>
<div style="font:600 15px var(--fm);margin:2px 0">${fm(totT)}</div>
<div style="font:400 11px var(--f);color:var(--t3)">${sevT} severe</div></div>
<div style="background:var(--bg);border-radius:5px;padding:7px;text-align:center">
<div style="font:400 11px var(--f);color:var(--t3)">No testing</div>
<div style="font:600 15px var(--fm);margin:2px 0">${fm(totN)}</div>
<div style="font:400 11px var(--f);color:var(--t3)">${sevN} severe</div></div></div>

<div class="rw"><span>Cost difference</span><span class="m" style="color:${saving?'var(--ok)':'var(--bad)'}">${saving?'':'+ '}${fm(diff)}</span></div>
<div class="rw"><span>Reactions prevented</span><span class="m">${sevDiff}</span></div>
${ratio}

<div style="border-radius:6px;padding:10px;margin-top:6px;background:${saving?'var(--okbg)':'var(--badbg)'};border:1px solid ${saving?'var(--okbd)':'var(--badbd)'}">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
<div><div style="font:400 10px var(--f);color:${saving?'var(--ok)':'var(--bad)'}">Per 1,000 patients</div>
<div style="font:600 20px var(--fm);color:${saving?'var(--ok)':'var(--bad)'};margin-top:1px">${saving?'Saves ':'+ '}${fm(Math.abs(diff))}</div></div>
<div><div style="font:400 10px var(--f);color:${saving?'var(--ok)':'var(--bad)'}">Per patient</div>
<div style="font:600 20px var(--fm);color:${saving?'var(--ok)':'var(--bad)'};margin-top:1px">${saving?'Saves ':'+ '}${fm(Math.abs(ppD))}</div></div></div></div>

<div class="hl">${saving
?`Panel: ${fm(tc*N)}. Chemo savings from ${nAdj} adjusted patients: ${fm(nAdj*chSav)}. Prevented reactions offset costs. ${sevDiff} avoid hospitalization.`
:`Panel: ${fm(tc*N)}. Chemo savings: ${fm(nAdj*chSav)}. ${sevDiff} prevented reactions (${fm(sevDiff*ac)}) don't fully offset costs.`}</div>
<div class="hl" style="margin-top:3px;padding-top:3px;border-top:0.5px solid var(--bd)">${(()=>{
  const bk=sevDiff>0?Math.round((tc*N-nAdj*chSav)/(sevDiff)):0;
  return saving
    ?'Stops saving if severe reaction cost drops below ~'+fm(Math.max(0,bk))+'.'
    :'Break-even: severe reaction cost > ~'+fm(Math.max(0,bk))+' (currently '+fm(ac)+').';
})()}</div>`;
}
u();
</script>
</body>
</html>
